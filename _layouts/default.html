<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
	<meta name="description" content="{{ page.description | default: site.description }}">
	<meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
	<meta property="og:description" content="{{ page.description | default: site.description }}">
	<meta property="og:type" content="website">
	<meta property="og:url" content="{{ site.url }}{{ page.url }}">
	<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
	<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">
	<link rel="stylesheet" href="{{ '/index.css' | relative_url }}">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
	<header class="site-header">
		<div class="container">
			<a href="{{ '/' | relative_url }}" class="site-title">FoglineSF <span class="site-subtitle">/ Data Projects</span></a>
			<nav class="site-nav">
				<a href="{{ '/' | relative_url }}"{% if page.nav_section == 'projects' %} aria-current="page"{% endif %}>Projects</a>
				<a href="{{ '/resources/' | relative_url }}"{% if page.nav_section == 'resources' %} aria-current="page"{% endif %}>Resources</a>
				<a href="https://foglinesf.com">Newsletter ↗</a>
			</nav>
		</div>
	</header>

	<main>
		<div class="container">
			{{ content }}
		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>Part of <a href="https://foglinesf.com">FoglineSF</a>, a San Francisco newsletter. Source on <a href="https://github.com/foglinesf/foglinesf.github.io">GitHub</a>.</p>
		</div>
	</footer>
</body>
</html>
